services:

  mysql:
    image: mysql:8
    container_name: leave_mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: leave_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: