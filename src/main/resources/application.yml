spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

springdoc:
  swagger-ui:
    path: /docs

logging:
  level:
    com.aryan.springboot.leavemanagement: DEBUG