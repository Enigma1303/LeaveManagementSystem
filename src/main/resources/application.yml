spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

  notification:
    retry:
      max-attempts: 3
      interval-seconds: 30
      backoff-multiplier: 2

  leave:
    reminder:
      days-before-start: 2

springdoc:
  swagger-ui:
    path: /docs

logging:
  level:
    com.aryan.springboot.leavemanagement: DEBUG

app:
  holiday:
    api-url: https://tallyfy.com/national-holidays/api
    country-code: 91
    fallback-on-error: true