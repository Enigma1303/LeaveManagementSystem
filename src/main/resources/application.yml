spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

  leave:
    reminder:
      cron: "*/30 * * * * *"
      days-before-start: 30

springdoc:
  swagger-ui:
    path: /docs
  show-actuator: true

logging:
  level:
    com.aryan.springboot.leavemanagement: DEBUG

app:
  holiday:
    api-url: https://tallyfy.com/national-holidays/api
    country-code: 91
    fallback-on-error: true
    cache-ttl-hours: 24

  notification:
    retry:
      max-attempts: 3
      interval-seconds: 10
      backoff-multiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true
